<html lang="ja">

<title>沖縄県議会議員マップ 2024</title>
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d2e;
    --surface2: #242740;
    --border: #2e3250;
    --text: #e8eaf6;
    --text2: #9fa8da;
    --text3: #5c6bc0;
    --accent: #6c63ff;

    /* 党派カラー */
    --ldp:    #e53935;  /* 自由民主党 */
    --komeito:#f9c74f;  /* 公明党 */
    --cdp:    #1565c0;  /* 立憲民主党 */
    --jcp:    #c62828;  /* 日本共産党 */
    --sdp:    #e91e63;  /* 社会民主党 */
    --ssd:    #00897b;  /* 沖縄社会大衆党 */
    --ishin:  #43a047;  /* 日本維新の会 */
    --ind:    #78909c;  /* 無所属 */
    --unk:    #37474f;  /* 未確認 */
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Kaku Gothic ProN', 'Noto Sans JP', 'Yu Gothic', sans-serif;
    font-size: 13px;
    line-height: 1.6;
  }

  /* ── HEADER ── */
  header {
    background: linear-gradient(135deg, #1a1d2e 0%, #242740 100%);
    border-bottom: 1px solid var(--border);
    padding: 18px 28px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
    position: sticky; top: 0; z-index: 100;
  }
  header h1 { font-size: 17px; font-weight: 700; letter-spacing: .5px; }
  header h1 span { color: var(--accent); }
  .header-meta { font-size: 11px; color: var(--text2); text-align: right; }
  .header-meta a { color: var(--text3); text-decoration: none; }
  .header-meta a:hover { color: var(--text2); }

  /* ── NOTICE ── */
  .notice {
    background: #1a1a2e;
    border-left: 3px solid #f9c74f;
    margin: 16px 28px;
    padding: 10px 14px;
    font-size: 11px;
    color: var(--text2);
    border-radius: 0 4px 4px 0;
  }

  /* ── LEGEND ── */
  .legend {
    display: flex; flex-wrap: wrap; gap: 8px;
    padding: 10px 28px;
    border-bottom: 1px solid var(--border);
  }
  .legend-item {
    display: flex; align-items: center; gap: 5px;
    font-size: 11px; color: var(--text2);
    cursor: pointer;
    padding: 3px 8px;
    border-radius: 12px;
    border: 1px solid transparent;
    transition: border-color .2s;
  }
  .legend-item:hover { border-color: var(--border); }
  .legend-item.active { border-color: var(--text3); }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }

  /* ── MAIN LAYOUT ── */
  .main {
    display: grid;
    grid-template-columns: 420px 1fr;
    gap: 0;
    height: calc(100vh - 140px);
    overflow: hidden;
  }
  @media (max-width: 900px) {
    .main { grid-template-columns: 1fr; height: auto; }
  }

  /* ── MAP PANEL ── */
  .map-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    padding: 20px;
    overflow-y: auto;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .map-panel h2 {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
    text-transform: uppercase;
  }

  /* ── DISTRICT GRID ── */
  .district-grid {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .district-btn {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 14px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
    color: var(--text);
  }
  .district-btn:hover { border-color: var(--accent); background: #1e2140; }
  .district-btn.active { border-color: var(--accent); background: #1e2140; box-shadow: 0 0 0 1px var(--accent); }
  .district-name { font-size: 13px; font-weight: 600; }
  .district-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }
  .district-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .district-seats { font-size: 11px; color: var(--text2); }
  .party-dots { display: flex; gap: 3px; flex-wrap: wrap; justify-content: flex-end; max-width: 100px; }
  .party-dot {
    width: 8px; height: 8px; border-radius: 50%;
    border: 1px solid rgba(255,255,255,.15);
  }

  /* ── DETAIL PANEL ── */
  .detail-panel {
    padding: 24px;
    overflow-y: auto;
  }
  .detail-empty {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    font-size: 14px;
    gap: 12px;
  }
  .detail-empty svg { opacity: .3; }

  .detail-header {
    margin-bottom: 20px;
    padding-bottom: 16px;
    border-bottom: 1px solid var(--border);
  }
  .detail-header h2 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .detail-header .sub {
    font-size: 12px;
    color: var(--text2);
  }

  /* ── MEMBER CARDS ── */
  .member-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
    gap: 14px;
  }
  .member-card {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    transition: border-color .2s;
  }
  .member-card:hover { border-color: var(--text3); }
  .member-card-top {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 12px;
  }
  .member-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 18px;
    font-weight: 700;
    flex-shrink: 0;
    color: #fff;
  }
  .member-info h3 {
    font-size: 15px;
    font-weight: 700;
    margin-bottom: 2px;
  }
  .member-info .yomi {
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 4px;
  }
  .member-party-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 10px;
    font-size: 10px;
    font-weight: 600;
    color: #fff;
  }
  .member-role {
    font-size: 10px;
    color: var(--text2);
    margin-bottom: 8px;
  }
  .member-policy {
    font-size: 11px;
    color: var(--text2);
    line-height: 1.7;
    border-top: 1px solid var(--border);
    padding-top: 10px;
    margin-top: 10px;
  }
  .member-policy-label {
    font-size: 10px;
    color: var(--text3);
    font-weight: 600;
    margin-bottom: 4px;
    letter-spacing: .5px;
  }
  .member-link {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 10px;
    font-size: 11px;
    color: var(--accent);
    text-decoration: none;
    transition: opacity .2s;
  }
  .member-link:hover { opacity: .7; }
  .unknown-badge {
    font-size: 10px;
    color: var(--text3);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    margin-top: 6px;
    display: inline-block;
  }

  /* ── FACTION SUMMARY ── */
  .faction-summary {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 20px;
  }
  .faction-summary h3 {
    font-size: 12px;
    color: var(--text3);
    letter-spacing: 1px;
    margin-bottom: 12px;
    text-transform: uppercase;
  }
  .faction-bars { display: flex; flex-direction: column; gap: 8px; }
  .faction-row {
    display: flex; align-items: center; gap: 10px;
  }
  .faction-label { font-size: 11px; color: var(--text2); width: 130px; flex-shrink: 0; }
  .faction-bar-wrap { flex: 1; height: 8px; background: var(--surface2); border-radius: 4px; overflow: hidden; }
  .faction-bar { height: 100%; border-radius: 4px; transition: width .6s ease; }
  .faction-count { font-size: 11px; color: var(--text); width: 25px; text-align: right; }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>

// ── ビルド ────────────────────────────────────────────────────────────────────

function partyColor(party) {
  return PARTY_COLOR[party] || PARTY_COLOR['未確認'];
}
function partyShort(party) {
  return PARTY_SHORT[party] || party;
}

function getMembersOf(districtName) {
  return MEMBERS.filter(m => m.district === districtName);
}

// 会派バー
function buildFactionBars() {
  const el = document.getElementById('factionBars');
  const max = Math.max(...FACTIONS.map(f => f.seats));
  el.innerHTML = FACTIONS.map(f => `
    <div class="faction-row">
      <div class="faction-label">${f.name}</div>
      <div class="faction-bar-wrap">
        <div class="faction-bar" style="width:${(f.seats/max*100).toFixed(1)}%;background:${f.color}"></div>
      </div>
      <div class="faction-count">${f.seats}</div>
    </div>
  `).join('');
}

// 選挙区リスト
function buildDistrictGrid() {
  const el = document.getElementById('districtGrid');
  el.innerHTML = DISTRICTS.map(d => {
    const members = getMembersOf(d.name);
    const dots = members.map(m =>
      `<span class="party-dot" style="background:${partyColor(m.party)}" title="${m.name}（${m.party}）"></span>`
    ).join('');
    const unknownCount = d.seats - members.length;
    const unknownDots = unknownCount > 0
      ? Array(unknownCount).fill(`<span class="party-dot" style="background:var(--unk)"></span>`).join('')
      : '';
    return `
      <button class="district-btn" data-district="${d.name}" onclick="selectDistrict('${d.name}', this)">
        <div>
          <div class="district-name">${d.name}</div>
          <div class="district-meta">${d.desc.length > 28 ? d.desc.slice(0,28)+'…' : d.desc}</div>
        </div>
        <div class="district-right">
          <div class="district-seats">定数 ${d.seats}</div>
          <div class="party-dots">${dots}${unknownDots}</div>
        </div>
      </button>`;
  }).join('');
}

// 議員カード
function memberCard(m) {
  const initial = m.name.replace(/\s/g,'')[0];
  const color = partyColor(m.party);
  return `
    <div class="member-card">
      <div class="member-card-top">
        <div class="member-avatar" style="background:${color}22;border:2px solid ${color}44">
          <span style="color:${color}">${initial}</span>
        </div>
        <div class="member-info">
          <h3>${m.name}</h3>
          <div class="yomi">${m.yomi}</div>
          <span class="member-party-badge" style="background:${color}">${m.party}</span>
        </div>
      </div>
      ${m.role ? `<div class="member-role">▷ ${m.role}</div>` : ''}
      <div style="font-size:10px;color:var(--text3);margin-bottom:4px">会派：${m.faction}</div>
      <div class="member-policy">
        <div class="member-policy-label">主な政策・活動方針</div>
        ${m.policy}
      </div>
      ${m.site ? `<a class="member-link" href="${m.site}" target="_blank">
        <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/>
          <line x1="10" y1="14" x2="21" y2="3"/>
        </svg>公式サイト
      </a>` : ''}
    </div>`;
}

// 選挙区選択
let activeBtn = null;
function selectDistrict(name, btn) {
  if (activeBtn) activeBtn.classList.remove('active');
  btn.classList.add('active');
  activeBtn = btn;

  const d = DISTRICTS.find(x => x.name === name);
  const members = getMembersOf(name);
  const detail = document.getElementById('detailPanel');

  const partyCounts = {};
  members.forEach(m => { partyCounts[m.party] = (partyCounts[m.party]||0)+1; });
  const partyBadges = Object.entries(partyCounts)
    .map(([p,n]) => `<span style="background:${partyColor(p)};color:#fff;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:600;margin-right:4px">${p} ${n}</span>`)
    .join('');

  const missingCount = d.seats - members.length;
  const missingNote = missingCount > 0
    ? `<div style="color:var(--text3);font-size:11px;margin-top:8px">※ ${missingCount}名のデータは公開情報から取得できていません。<a href="https://www.pref.okinawa.lg.jp/kensei/gikai/index.html" target="_blank" style="color:var(--accent)">公式サイト</a>をご確認ください。</div>`
    : '';

  detail.innerHTML = `
    <div class="detail-header">
      <h2>${name}</h2>
      <div class="sub">定数 ${d.seats}議席　│　${d.desc}</div>
      <div style="margin-top:10px">${partyBadges}</div>
      ${missingNote}
    </div>
    <div class="member-grid">
      ${members.length > 0 ? members.map(memberCard).join('') : '<div style="color:var(--text3);padding:20px">議員データが未取得です。公式サイトをご確認ください。</div>'}
    </div>
  `;
}

// 凡例フィルタ
document.querySelectorAll('.legend-item').forEach(item => {
  item.addEventListener('click', () => {
    item.classList.toggle('active');
    // 現在の選択区を再描画
    if (activeBtn) {
      const name = activeBtn.dataset.district;
      selectDistrict(name, activeBtn);
    }
  });
});
